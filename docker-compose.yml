# ============================================================================
# Docker Compose configuration for Tiền Của Tôi Đâu
# File: docker-compose.yml
# ============================================================================

version: "3.9"

services:
  app:
    container_name: tien-cua-toi-dau
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      OPENCODE_API_KEY: ${OPENCODE_API_KEY}
      OPENCODE_MODEL: ${OPENCODE_MODEL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - tien-net

  # Nginx service (Chỉ sử dụng nếu bạn muốn chạy Nginx reverse proxy trong Docker)
  # Lưu ý: Cần tạo thư mục ./nginx với file nginx.conf và các file SSL tương ứng
  # Nếu deploy theo docs/DEPLOY_AWS.md, hãy cài đặt Nginx trực tiếp trên VPS host và comment service này.
  # nginx:
  #   image: nginx:alpine
  #   container_name: tien-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - ./nginx/ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - app
  #   restart: unless-stopped
  #   networks:
  #     - tien-net

networks:
  tien-net:
    driver: bridge
